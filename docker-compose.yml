version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: travelmemory_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: xxxxxx
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelmemory_backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://admin:xxxxxx@mongodb:27017/travelmemory?authsource=admin
    ports:
      - "3001:3001"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BASE_URL: http://backend:3001
    container_name: travelmemory_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
    name: travelmemory_mongo_data
